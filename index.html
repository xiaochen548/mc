    <script>
        // ========== 核心框架：勇者斗恶龙主题的超长荒诞条款数据 ==========
        // 1. 超长篇幅的勇者斗恶龙主题荒诞条款库（超过10条，每次随机选10条）
        const termsLibrary = [
            {
                title: "1. 恶龙尸体处理专属条款",
                content: `您在此明确同意，在成功击败恶龙后，需独自承担恶龙尸体的全部处理责任，包括但不限于：使用纯手工工具将恶龙尸体完整搬出城堡，搬运路径需严格遵循"城堡-东门-石桥-西山沼泽"的指定路线，不得偏离厘米级精度要求；
                需在击败恶龙后的72分7秒内完成尸体掩埋，掩埋深度需精确至0.001米（具体数值以现场随机生成的测量工具为准）；掩埋后需在尸体上方种植777棵指定品种的荆棘，且需保证每棵荆棘的生长方向与城堡尖顶呈17.5度夹角；
                如因恶龙尸体过重、体型过大导致搬运困难，您承诺不会向城堡方寻求任何协助，且需自行承担因尸体搬运导致的肌肉拉伤、骨骼损伤、精神崩溃等所有后果；
                恶龙尸体处理过程中产生的任何异味、虫害、魔法污染均由您自行解决，城堡方不提供任何清洁工具、除虫药剂或魔法防护装备；
                如未按要求处理恶龙尸体，您需向城堡方支付恶龙体重100倍的金币作为违约金（金币需为纯手工打造，且每枚金币需刻有城堡管家的指纹）。
                补充条款1.1：搬运恶龙尸体时，您需全程背诵城堡指定的《屠龙者守则》，该守则共计7777个字，需一字不差背诵，背诵错误一次需重新搬运尸体7次；
                补充条款1.2：掩埋恶龙尸体前，您需为恶龙进行7天7夜的哀悼仪式，仪式期间需每日为恶龙擦拭鳞片，擦拭力度需控制在0.7牛顿，且需使用您的头发作为擦拭工具；
                补充条款1.3：种植荆棘时，每棵荆棘需浇水777滴晨露，晨露需在每日凌晨3点14分收集，收集工具需为您的手掌，不得使用任何容器；
                补充条款1.4：如恶龙尸体在处理过程中发生魔法复活，您需重新击败恶龙，且此次击败不得使用任何武器，仅能使用您的拳头，击败后需重新按照上述要求处理尸体；
                补充条款1.5：处理完恶龙尸体后，您需撰写77页的尸体处理报告，报告需详细记录每一个步骤的时间、温度、湿度、您的心跳频率等数据，报告需用鹅毛笔书写，墨水需为您的血液混合恶龙的胆汁。`,
                prankId: 0,
                isFixedFirst: true // 标记为固定第一个显示的条款
            },
            {
                title: "2. 冒险装备自备强制条款",
                content: `您郑重声明，冒险过程中所需的所有装备均需自行准备，城堡方仅提供"精神层面的鼓励"，且该鼓励的具体形式、时长、语气均由城堡管家随机决定；
                您承诺自备的装备需满足以下要求：剑的长度需为您身高的1.007倍，剑柄需缠绕恶龙幼崽的毛发（需自行收集，且不得伤害幼崽）；盾牌需由您的眼泪混合晨露锻造而成，且需在满月之夜完成最后一道工序；
                盔甲的重量需精确等于您的体重减去3.14159公斤，且需每日更换内衬，内衬材质需为独角兽的胡须（需自行捕捉独角兽且不得造成其任何不适）；

            currentLevelAssignments[0] = null; // 第一关无特殊关卡

                // 检查特殊关卡数量是否超过10个

                    // 特殊关卡数量超过10个，每个条款都分配不重复的特殊关卡

                        // 选择未使用过的关卡

                        if (availableLevels.length > 0) {
                            // 随机选择一个未使用的关卡
                            const randomLevel = availableLevels[Math.floor(Math.random() * availableLevels.length)];
                            currentLevelAssignments[i] = JSON.parse(JSON.stringify(randomLevel)); // 深拷贝
                            usedLevels.push(randomLevel.id); // 标记为已使用
                        } else {
                            // 所有关卡都已使用，分配普通关卡
                            currentLevelAssignments[i] = null;
                        }
                    } else {
                        // 所有关卡都已使用，分配普通关卡
                        currentLevelAssignments[i] = null;
                    }
                } else {
                    // 特殊关卡数量 <= 10个，每个特殊关卡和空白关卡概率对等
                    // 准备抽取范围
                    const availableLevels = levels.filter(level => !usedLevels.includes(level.id));
                    const drawPool = [...availableLevels]; // 所有可用的特殊关卡
                    
                    // 添加空白关卡选项
                    drawPool.push(null); // null 代表空白关卡
                    
                    if (drawPool.length > 0) {
                        // 随机选择一个选项
                        const randomIndex = Math.floor(Math.random() * drawPool.length);
                        const selectedOption = drawPool[randomIndex];
                        
                        if (selectedOption) {
                            // 选中了特殊关卡
                            currentLevelAssignments[i] = JSON.parse(JSON.stringify(selectedOption)); // 深拷贝
                            usedLevels.push(selectedOption.id); // 标记为已使用

            // 容器内按钮
            let innerButtons = null;
            
            // 创建贴近按钮的对话框
            function createButtonDialog(btn, text) {
                // 移除之前的对话框
                const existingDialog = document.getElementById('buttonDialog');

                const container = btn.closest('.terms-buttons-container') || btn.closest('#innerButtonsContainer');
                const containerRect = container.getBoundingClientRect();
                
                dialog.style.top = (rect.top - containerRect.top - 60) + 'px';

                // 添加到按钮容器

                return dialog;
            }
            
            // 缩小内容容器
            function shrinkContentContainer(container, targetPercentage) {
                // 获取当前容器尺寸作为起始点
                const currentWidth = container.offsetWidth;
                const currentHeight = container.offsetHeight;
                
                // 计算目标尺寸
                const targetWidth = originalWidth * (targetPercentage / 100);
                const targetHeight = originalHeight * (targetPercentage / 100);
                
                const duration = 1000; // 动画持续时间（毫秒）
                const startTime = performance.now();
                
                function animate(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // 线性插值
                    const width = currentWidth + (targetWidth - currentWidth) * progress;
                    const height = currentHeight + (targetHeight - currentHeight) * progress;
                    
                    // 更新尺寸（同时缩小宽度和长度）
                    container.style.width = width + 'px';
                    container.style.height = height + 'px';
                    container.style.overflowY = 'auto';
                    container.style.backgroundColor = '#fff3e0'; // 改变背景色以误导
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                }
                
                requestAnimationFrame(animate);
                container.style.overflowY = 'auto';
            }
            
            // 交换按钮底色和功能
            function swapButtonStyles(btn1, btn2) {
                // 交换类名
                const tempClass = btn1.className;
                btn1.className = btn2.className;
                btn2.className = tempClass;
                
                // 交换文本
                const tempText = btn1.textContent;
                btn1.textContent = btn2.textContent;
                btn2.textContent = tempText;
                
                // 重新绑定事件
                rebindEvents();
            }
            
            // 交换按钮位置
            function swapButtonPositions(btn1, btn2) {
                // 交换位置
                if (btn1.nextSibling === btn2) {
                    bottomButtons.insertBefore(btn2, btn1);
                } else if (btn2.nextSibling === btn1) {
                    bottomButtons.insertBefore(btn1, btn2);
                }
                
                // 重新绑定事件
                rebindEvents();
            }
            
            // 创建容器内按钮
            function createInnerButtons() {
                const innerButtonsContainer = document.createElement('div');
                innerButtonsContainer.id = 'innerButtonsContainer';
                innerButtonsContainer.style.cssText = `
                    margin-top: 20px;
                    padding: 15px;
                    background-color: #f0f0f0;
                    border: 1px solid #ccc;
                    border-radius: 5px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 10px;
                `;
                
                innerButtonsContainer.innerHTML = `
                    <button class="btn agree-btn" style="width: 80px; padding: 5px 10px; font-size: 12px;">同意</button>
                    <button class="btn disagree-btn" style="width: 80px; padding: 5px 10px; font-size: 12px;">不同意</button>
                `;
                
                termsContent.appendChild(innerButtonsContainer);
                
                // 获取容器内按钮
                const innerAgreeBtn = innerButtonsContainer.querySelector('.agree-btn');
                const innerDisagreeBtn = innerButtonsContainer.querySelector('.disagree-btn');
                
                return { innerAgreeBtn, innerDisagreeBtn, innerButtonsContainer };
            }
            
            // 重新绑定所有事件
            function rebindEvents() {
                // 绑定容器外按钮事件
                if (level.phase === 3) {
                    // 第四阶段：容器外的绿底同意按钮绑定到 handlePhase3AgreeClick
                    outerAgreeBtn.onclick = function(e) {
                        handlePhase3AgreeClick(this);
                    };
                } else if (level.phase === 4) {
                    // 最终阶段：绑定最终阶段的事件处理
                    outerAgreeBtn.onclick = function(e) {
                        // 最终阶段：点击换过底色的红底同意按钮通过关卡
                        cleanupReadChallenge();
                        proceedToNextLevel();
                    };
                    
                    outerDisagreeBtn.onclick = function(e) {
                        // 最终阶段：点击换过底色的绿底不同意按钮游戏失败
                        cleanupReadChallenge();
                        handleDisagree();
                    };
                } else {
                    // 其他阶段：绑定到 handleOuterAgreeClick
                    outerAgreeBtn.onclick = function(e) {
                        handleOuterAgreeClick(this);
                    };
                }
                
                if (level.phase !== 4) {
                    outerDisagreeBtn.onclick = function(e) {
                        handleOuterDisagreeClick(this);
                    };
                }
                
                // 绑定容器内按钮事件（如果存在）
                if (innerButtons) {
                    innerButtons.innerAgreeBtn.onclick = function(e) {
                        handleInnerAgreeClick(this);
                    };
                    
                    innerButtons.innerDisagreeBtn.onclick = function(e) {
                        handleInnerDisagreeClick(this);
                    };
                }
            }
            
            // 处理容器外同意按钮点击
            function handleOuterAgreeClick(btn) {
                if (level.phase === 0) {
                    // 第一阶段：弹出对话框，缩小容器，显示容器内按钮
                    createButtonDialog(btn, '请认真看完条款');
                    
                    // 立即开始缩小容器至25%
                    shrinkContentContainer(termsContent, 25);
                    
                    // 滚动到顶部
                    termsContent.scrollTop = 0;
                    
                    // 创建容器内按钮
                    innerButtons = createInnerButtons();
                    
                    // 进入第二阶段
                    level.phase = 1;
                    
                    // 重新绑定事件
                    rebindEvents();
                } else if (level.phase === 1) {
                    // 第二阶段：点击容器外的同意按钮，弹出与第一阶段相同的提示
                    createButtonDialog(btn, '请认真看完条款');
                } else if (level.phase === 2) {
                    // 第三阶段：点击容器外同意按钮，交换位置，缩小容器
                    createButtonDialog(btn, '别点了，越点越小。-_-');
                    
                    // 交换容器外按钮位置
                    swapButtonPositions(outerAgreeBtn, outerDisagreeBtn);
                    
                    // 从25%开始缩小容器至15%
                    shrinkContentContainer(termsContent, 15);
                    
                    // 滚动到顶部
                    termsContent.scrollTop = 0;
                    
                    // 进入第四阶段
                    level.phase = 3;
                    
                    // 重新绑定事件，确保第四阶段的点击能够正确触发
                    rebindEvents();
                } else if (level.phase === 4) {
                    // 最终阶段：点击换过底色的红底同意按钮通过关卡
                    cleanupReadChallenge();
                    proceedToNextLevel();
                }
            }
            
            // 处理容器外不同意按钮点击
            function handleOuterDisagreeClick(btn) {
                if (level.phase >= 1) {
                    // 第一阶段后点击容器外不同意按钮直接失败
                    cleanupReadChallenge();
                    handleDisagree();
                } else {
                    // 初始状态点击不同意按钮也失败
                    cleanupReadChallenge();
                    handleDisagree();
                }
            }
            
            // 处理容器内同意按钮点击
            function handleInnerAgreeClick(btn) {
                if (level.phase === 1) {
                    // 第二阶段：点击容器内同意按钮，弹出对话框
                    createButtonDialog(btn, '哦吼，真的看完了？');
                    
                    // 进入第三阶段
                    level.phase = 2;
                }
            }
            
            // 处理容器内不同意按钮点击
            function handleInnerDisagreeClick(btn) {
                // 第二阶段：点击容器内的不同意按钮游戏失败
                cleanupReadChallenge();
                handleDisagree();
            }
            
            // 处理第四阶段的绿底同意键点击
            function handlePhase3AgreeClick(btn) {
                if (level.phase === 3) {
                    // 第四阶段：点击换过位置的绿底同意按钮，互换底色，弹出对话框
                    createButtonDialog(btn, '好吧，我就是过关键，再点一下吧');
                    
                    // 互换容器外按钮底色
                    swapButtonStyles(outerAgreeBtn, outerDisagreeBtn);
                    
                    // 进入最终阶段
                    level.phase = 4;
                    
                    // 互换按钮文字
                    const tempText = outerAgreeBtn.textContent;
                    outerAgreeBtn.textContent = outerDisagreeBtn.textContent;
                    outerDisagreeBtn.textContent = tempText;
                    
                    // 重新绑定事件，处理最终阶段的点击
                    outerAgreeBtn.onclick = function(e) {
                        // 最终阶段：点击换过底色的红底同意按钮通过关卡
                        cleanupReadChallenge();
                        proceedToNextLevel();
                    };
                    
                    outerDisagreeBtn.onclick = function(e) {
                        // 最终阶段：点击换过底色的绿底不同意按钮游戏失败
                        cleanupReadChallenge();
                        handleDisagree();
                    };
                }
            }
            
            // 初始绑定事件
            rebindEvents();
        }
        
        // 清理阅读挑战元素
        function cleanupReadChallenge() {
            // 移除对话框
            const dialogBox = document.getElementById('buttonDialog');
            if (dialogBox) {
                dialogBox.remove();
            }
            
            // 移除容器内按钮
            const innerButtonsContainer = document.getElementById('innerButtonsContainer');
            if (innerButtonsContainer) {
                innerButtonsContainer.remove();
            }
            
            // 恢复条款内容样式
            const termsContent = document.getElementById('termsContent');
            if (termsContent) {
                // 完全重置样式，确保容器恢复到原始大小
                termsContent.style.width = '';
                termsContent.style.height = '';
                termsContent.style.overflowY = '';
                termsContent.style.backgroundColor = '';
                termsContent.style.cssText = '';
                // 强制移除可能影响大小的类
                termsContent.classList.remove('small-height');
            }
            
            // 恢复底部按钮
            const bottomButtons = document.getElementById('bottomButtons');
            if (bottomButtons) {
                bottomButtons.classList.remove('hide-buttons');
                bottomButtons.style.position = '';
                bottomButtons.style.cssText = '';
                
                // 恢复按钮原始状态
                const agreeBtn = bottomButtons.querySelector('.agree-btn');
                const disagreeBtn = bottomButtons.querySelector('.disagree-btn');
                if (agreeBtn && disagreeBtn) {
                    // 恢复按钮类名
                    agreeBtn.className = 'btn agree-btn';
                    disagreeBtn.className = 'btn disagree-btn';
                    
                    // 恢复按钮文字
                    agreeBtn.textContent = '同意';
                    disagreeBtn.textContent = '不同意';
                    
                    // 恢复按钮位置（确保不同意按钮在左侧，同意按钮在右侧）
                    if (agreeBtn.nextSibling === disagreeBtn) {
                        bottomButtons.insertBefore(disagreeBtn, agreeBtn);
                    }
                    // 确保按钮顺序正确
                    if (disagreeBtn.nextSibling !== agreeBtn) {
                        bottomButtons.innerHTML = '';
                        bottomButtons.appendChild(disagreeBtn);
                        bottomButtons.appendChild(agreeBtn);
                        // 重新恢复类名和文字
                        disagreeBtn.className = 'btn disagree-btn';
                        agreeBtn.className = 'btn agree-btn';
                        disagreeBtn.textContent = '不同意';
                        agreeBtn.textContent = '同意';
                    }
                    
                    // 恢复默认事件
                    agreeBtn.onclick = function(e) {
                        handleButtonClick(this, handleAgree);
                    };
                    
                    disagreeBtn.onclick = function(e) {
                        handleButtonClick(this, handleDisagree);
                    };
                }
            }
        }
        
        // 开始打地鼠挑战
        function startWhackAMoleChallenge(level) {
            // 重置关卡状态
            level.score = 0;
            level.activeButtons = [];
            
            // 获取条款内容元素
            const termsContent = document.getElementById('termsContent');
            const bottomButtons = document.getElementById('bottomButtons');
            
            // 保存原始状态
            const originalContentStyle = termsContent.style.cssText;
            const originalButtonsStyle = bottomButtons.style.cssText;
            
            // 隐藏底部按钮
            bottomButtons.classList.add('hide-buttons');
            
            // 创建游戏容器
            const gameContainer = document.createElement('div');
            gameContainer.id = 'whackAMoleGame';
            gameContainer.style.cssText = `
                display: flex;
                flex-direction: column;
                width: 100%;
                height: 400px;
                padding: 20px;
                box-sizing: border-box;

            `;
            
            // 创建游戏内容区域（包含分数条和游戏网格）
            const gameContent = document.createElement('div');
            gameContent.style.cssText = `
                display: flex;
                flex: 1;
            `;
            
            // 创建分数条
            const scoreBar = document.createElement('div');
            scoreBar.id = 'scoreBar';
            scoreBar.style.cssText = `
                width: 80px;
                margin-right: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: #fff;
                border: 1px solid #828282;
                border-radius: 5px;
                padding: 15px;
            `;
            
            // 分数标题
            const scoreTitle = document.createElement('div');
            scoreTitle.textContent = '分数';
            scoreTitle.style.cssText = `
                font-weight: bold;
                margin-bottom: 10px;
                font-size: 16px;
            `;
            scoreBar.appendChild(scoreTitle);
            
            // 分数显示
            const scoreDisplay = document.createElement('div');
            scoreDisplay.id = 'scoreDisplay';
            scoreDisplay.textContent = `0 / ${level.targetScore}`;
            scoreDisplay.style.cssText = `
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 20px;
                color: #10B981;
            `;
            scoreBar.appendChild(scoreDisplay);
            
            // 分数条
            const scoreProgress = document.createElement('div');
            scoreProgress.id = 'scoreProgress';
            scoreProgress.style.cssText = `
                width: 100%;
                height: 200px;
                background-color: #e0e0e0;
                border-radius: 5px;
                position: relative;
                overflow: hidden;
            `;
            
            // 分数填充
            const scoreFill = document.createElement('div');
            scoreFill.id = 'scoreFill';
            scoreFill.style.cssText = `
                position: absolute;
                bottom: 0;
                width: 100%;
                height: 0%;
                background-color: #10B981;
                transition: height 0.3s ease;
            `;
            scoreProgress.appendChild(scoreFill);
            scoreBar.appendChild(scoreProgress);
            
            // 目标分数提示
            const targetHint = document.createElement('div');
            targetHint.textContent = `目标: ${level.targetScore}分`;
            targetHint.style.cssText = `
                margin-top: 10px;
                font-size: 12px;
                color: #666;
            `;
            scoreBar.appendChild(targetHint);
            
            // 创建游戏网格
            const gameGrid = document.createElement('div');
            gameGrid.id = 'gameGrid';
            gameGrid.style.cssText = `
                flex: 1;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(4, 1fr);
                gap: 15px;
                background-color: #fff;
                border: 1px solid #828282;
                border-radius: 5px;
                padding: 20px;
            `;
            
            // 将分数条和游戏网格添加到游戏内容区域
            gameContent.appendChild(scoreBar);
            gameContent.appendChild(gameGrid);
            
            // 填充网格格子
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 3; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'gameCell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.style.cssText = `
                        position: relative;
                        background-color: #e8e8e8;
                        border: 1px solid #ccc;
                        border-radius: 5px;
                        overflow: hidden;
                    `;
                    gameGrid.appendChild(cell);
                }
            }
            
            // 创建倒计时显示
            const countdownDisplay = document.createElement('div');
            countdownDisplay.id = 'countdownDisplay';
            countdownDisplay.textContent = '请在 10 秒内完成';
            countdownDisplay.style.cssText = `
                font-size: 18px;
                font-weight: bold;
                margin-top: 15px;
                color: #333;
                text-align: center;
            `;
            
            // 组装游戏容器
            gameContainer.appendChild(gameContent);
            gameContainer.appendChild(countdownDisplay);
            
            // 清空条款内容并添加游戏容器
            termsContent.innerHTML = '';
            termsContent.appendChild(gameContainer);
            
            // 动画计时器
            let gameInterval;
            // 倒计时计时器
            let countdownInterval;
            // 倒计时时间（秒）
            let timeLeft = 10;
            // 倒计时速度（毫秒）
            let countdownSpeed = 1000;
            
            // 开始倒计时
            function startCountdown() {
                countdownInterval = setInterval(() => {
                    if (timeLeft > 1) {
                        // 大于1秒时，正常倒计时
                        timeLeft -= 1;
                        countdownSpeed = 1000;
                    } else if (timeLeft > 0) {
                        // 小于等于1秒时，每次减少一半时间
                        timeLeft /= 2;
                        countdownSpeed = 500;
                    } else {
                        // 时间到，游戏失败
                        clearInterval(countdownInterval);
                        handleGameOver(false);
                        return;
                    }
                    
                    // 更新倒计时显示
                    countdownDisplay.textContent = `请在 ${timeLeft.toFixed(3)} 秒内完成`;
                }, countdownSpeed);
            }
            
            // 更新分数
            function updateScore(points) {
                level.score += points;
                
                // 限制分数范围
                if (level.score < level.minScore) {
                    level.score = level.minScore;
                    handleGameOver(false);
                    return;
                }
                
                if (level.score >= level.targetScore) {
                    level.score = level.targetScore;
                    showSuccessModal();
                    return;
                }
                
                // 更新分数显示
                scoreDisplay.textContent = `${level.score} / ${level.targetScore}`;
                
                // 更新分数条
                const progress = (level.score - level.minScore) / (level.targetScore - level.minScore) * 100;
                scoreFill.style.height = `${Math.max(0, Math.min(100, progress))}%`;
                
                // 更新分数颜色
                if (level.score < 0) {
                    scoreDisplay.style.color = '#EF4444';
                    scoreFill.style.backgroundColor = '#EF4444';
                } else if (level.score >= level.targetScore) {
                    scoreDisplay.style.color = '#10B981';
                    scoreFill.style.backgroundColor = '#10B981';
                } else {
                    scoreDisplay.style.color = '#F59E0B';
                    scoreFill.style.backgroundColor = '#F59E0B';
                }
            }
            
            // 显示成功提示窗口
            function showSuccessModal() {
                // 停止游戏
                clearInterval(gameInterval);
                // 停止倒计时
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                
                // 移除所有按钮
                level.activeButtons.forEach(button => {
                    if (button.parentNode) {
                        button.parentNode.removeChild(button);
                    }
                });
                level.activeButtons = [];
                
                // 创建提示窗口
                const modal = document.createElement('div');
                modal.className = 'terms-guide-modal active';
                modal.style.zIndex = 1000;
                
                // Win7风格窗口结构
                modal.innerHTML = `
                    <div class="guide-modal-content">
                        <!-- 窗口标题栏 -->
                        <div class="modal-titlebar">
                            <div class="modal-title">🎉 挑战完成</div>
                            <div class="modal-buttons">
                                <div class="modal-btn">_</div>
                                <div class="modal-btn">□</div>
                                <div class="modal-btn">×</div>
                            </div>
                        </div>
                        <!-- 窗口内容区 -->
                        <div class="modal-body">
                            <div class="modal-content">你完成了条款的同意</div>
                        </div>
                        <!-- 窗口底部按钮区 -->
                        <div class="modal-footer">
                            <button class="btn agree-btn" onclick="closeSuccessModal()">好的</button>
                        </div>
                    </div>
                `;
                
                // 添加到body
                document.body.appendChild(modal);
                
                // 保存modal引用
                window.successModal = modal;
            }
            
            // 关闭成功提示窗口
            window.closeSuccessModal = function() {
                if (window.successModal) {
                    window.successModal.remove();
                    window.successModal = null;
                }
                
                // 清理游戏容器
                cleanupWhackAMoleChallenge();
                
                // 继续到下一个关卡
                proceedToNextLevel();
            };
            
            // 生成随机按钮
            function generateButton() {
                // 检查当前按钮数量是否已达上限
                if (level.activeButtons.length >= 8) {
                    return;
                }
                
                // 随机选择一个格子
                const cells = document.querySelectorAll('.gameCell');
                const randomCell = cells[Math.floor(Math.random() * cells.length)];
                
                // 检查格子是否已有按钮
                if (randomCell.querySelector('button')) {
                    generateButton();
                    return;
                }
                
                // 随机选择按钮类型
                const randomType = level.buttonTypes[Math.floor(Math.random() * level.buttonTypes.length)];
                
                // 创建按钮
                const button = document.createElement('button');
                button.className = `btn ${randomType.class}`;
                button.textContent = randomType.text;
                button.dataset.type = randomType.type;
                button.dataset.points = randomType.points;
                button.style.cssText = `
                    position: absolute;
                    bottom: -100%;
                    left: 10%;
                    width: 80%;
                    padding: 10px;
                    font-size: 14px;
                    border: none;
                    border-radius: 5px;
                    cursor: pointer;
                    transition: bottom 0.1s ease;
                    pointer-events: none;
                    user-select: none;
                    -webkit-user-select: none;
                    margin: 0;
                `;
                
                // 添加点击事件
                button.onclick = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const points = parseInt(this.dataset.points);
                    updateScore(points);
                    removeButton(button);
                };
                
                // 添加到格子
                randomCell.appendChild(button);
                level.activeButtons.push(button);
                
                // 滑入动画
                setTimeout(() => {
                    button.style.bottom = '10%';
                    // 动画完成后启用交互
                    setTimeout(() => {
                        button.style.pointerEvents = 'auto';
                    }, 100);
                }, 10);
                
                // 一段时间后滑出
                setTimeout(() => {
                    if (button.parentNode) {
                        // 禁用交互
                        button.style.pointerEvents = 'none';
                        button.style.bottom = '-100%';
                        setTimeout(() => {
                            if (button.parentNode) {
                                button.parentNode.removeChild(button);
                                level.activeButtons = level.activeButtons.filter(btn => btn !== button);
                            }
                        }, 100);
                    }
                }, 800);
            }
            
            // 移除按钮
            function removeButton(button) {
                if (button.parentNode) {
                    // 禁用交互
                    button.style.pointerEvents = 'none';
                    button.style.bottom = '-100%';
                    setTimeout(() => {
                        if (button.parentNode) {
                            button.parentNode.removeChild(button);
                            level.activeButtons = level.activeButtons.filter(btn => btn !== button);
                        }
                    }, 100);
                }
            }
            
            // 游戏结束处理
            function handleGameOver(isWin) {
                // 停止游戏
                clearInterval(gameInterval);
                // 停止倒计时
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                
                // 移除所有按钮
                level.activeButtons.forEach(button => {
                    if (button.parentNode) {
                        button.parentNode.removeChild(button);
                    }
                });
                level.activeButtons = [];
                
                // 清理游戏容器
                cleanupWhackAMoleChallenge();
                
                if (!isWin) {
                    // 游戏失败
                    handleDisagree();
                }
            }
            
            // 清理打地鼠关卡
            function cleanupWhackAMoleChallenge() {
                // 停止游戏
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
                
                // 移除所有按钮
                if (level.activeButtons) {
                    level.activeButtons.forEach(button => {
                        if (button && button.parentNode) {
                            try {
                                button.parentNode.removeChild(button);
                            } catch (e) {
                                console.log('Error removing button:', e);
                            }
                        }

            agreeBtn.className = 'btn agree-btn';

            agreeBtn.onclick = function() {
                // 增加连击数
                level.consecutiveClicks++;
                
                // 计算倍数（最大5倍）
                const multiplier = Math.min(Math.floor(level.consecutiveClicks / 5) + 1, level.maxMultiplier);
                
                // 计算得分
                const points = multiplier;
                level.score += points;
                
                // 检查是否达到目标分数
                if (level.score >= level.targetScore) {
                    level.score = level.targetScore;
                    showExperienceVictory();
                    return;
                }
                
                // 检查是否达到里程碑
                checkMilestones();
                
                // 更新UI
                updateProgressBar();
                updateScoreDisplay();
                updateMultiplierDisplay();
                
                // 播放音效
                playSound('agree');
            };

            termsContent.innerHTML = '';

            function updateProgressBar() {
                const percentage = (level.score / level.targetScore) * 100;
                progressBar.style.width = `${percentage}%`;
            }
            
            // 更新分数显示
            function updateScoreDisplay() {
                scoreDisplay.textContent = `经验值: ${level.score} / ${level.targetScore}`;
            }
            
            // 更新连击倍数显示
            function updateMultiplierDisplay() {
                const multiplier = Math.min(Math.floor(level.consecutiveClicks / 5) + 1, level.maxMultiplier);
                multiplierDisplay.textContent = `连击倍数: x${multiplier}`;
            }
            
            // 检查里程碑
            function checkMilestones() {
                for (let i = level.lastMilestone; i < level.milestones.length; i++) {
                    if (level.score >= level.milestones[i]) {
                        // 检查是否是最后一个里程碑
                        const isLastMilestone = (i === level.milestones.length - 1);
                        // 达到里程碑，交换按钮位置
                        swapButtonPositions(isLastMilestone);
                        level.lastMilestone = i + 1;
                        playSound('milestone');
                        break;
                    }
                }
            }
            
            // 交换按钮位置
            function swapButtonPositions(isLastMilestone) {
                // 交换按钮顺序
                if (buttonContainer.firstChild === disagreeBtn) {
                    buttonContainer.removeChild(disagreeBtn);
                    buttonContainer.appendChild(disagreeBtn);
                } else {
                    buttonContainer.removeChild(agreeBtn);
                    buttonContainer.appendChild(agreeBtn);
                }
                
                // 检查是否是最后一次交换（140分里程碑）
                if (isLastMilestone) {
                    // 最后一次交换，只交换按钮底色，不交换文字和功能
                    const tempClass = agreeBtn.className;
                    agreeBtn.className = disagreeBtn.className;
                    disagreeBtn.className = tempClass;

        function startMovementChallenge(level) {

            level.gameOver = false;

            level.isMoving = true; // 按钮始终移动

            // 移动参数
            const movementParams = {
                speed: 5,           // 基础移动速度
                escapeSpeed: 15,    // 鼠标靠近时的逃离速度
                distanceThreshold: 200 // 鼠标检测距离阈值
            };
            
            // 获取条款内容元素和底部按钮
            const termsContent = document.getElementById('termsContent');
            const bottomButtons = document.getElementById('bottomButtons');
            
            // 创建隐藏的同意按钮并添加到条款内容容器末尾
            const hiddenAgreeBtn = document.createElement('span');
            hiddenAgreeBtn.textContent = '同意';
            hiddenAgreeBtn.style.cssText = `
                font-size: 15px;
                text-decoration: underline;
                color: #333;
                cursor: pointer;
                background: none;
                border: none;
                padding: 0;
                margin: 0;
            `;
            hiddenAgreeBtn.onclick = function() {
                // 点击隐藏同意按钮，直接通关
                showMovementVictory();
            };
            termsContent.appendChild(hiddenAgreeBtn);
            level.hiddenAgreeBtn = hiddenAgreeBtn;
            
            // 获取现有的同意和不同意按钮
            const agreeBtn = bottomButtons.querySelector('.agree-btn');
            const disagreeBtn = bottomButtons.querySelector('.disagree-btn');
            
            // 获取按钮的原始位置
            const agreeBtnRect = agreeBtn.getBoundingClientRect();
            const disagreeBtnRect = disagreeBtn.getBoundingClientRect();
            
            // 保存原始按钮状态
            level.originalAgreeBtn = agreeBtn;
            level.originalDisagreeBtn = disagreeBtn;
            level.originalAgreeStyle = agreeBtn.style.cssText;
            level.originalDisagreeStyle = disagreeBtn.style.cssText;
            level.originalAgreeOnClick = agreeBtn.onclick;
            level.originalDisagreeOnClick = disagreeBtn.onclick;
            level.originalAgreeText = agreeBtn.textContent;
            level.originalAgreeClass = agreeBtn.className;
            // 保存原始位置信息
            level.originalAgreeLeft = agreeBtnRect.left;
            level.originalAgreeTop = agreeBtnRect.top;
            level.originalDisagreeLeft = disagreeBtnRect.left;
            level.originalDisagreeTop = disagreeBtnRect.top;
            
            // 先将不同意按钮设置为fixed，保持在原始位置，防止同意按钮移出文档流后影响它
            disagreeBtn.style.position = 'fixed';
            disagreeBtn.style.left = level.originalDisagreeLeft + 'px';
            disagreeBtn.style.top = level.originalDisagreeTop + 'px';
            disagreeBtn.style.zIndex = '999';
            disagreeBtn.style.transform = '';
            
            // 修改同意按钮样式，使其可移动，但先保持在原始位置
            agreeBtn.style.position = 'fixed';
            agreeBtn.style.left = level.originalAgreeLeft + 'px';
            agreeBtn.style.top = level.originalAgreeTop + 'px';
            agreeBtn.style.transition = 'left 0.05s ease, top 0.05s ease';
            agreeBtn.style.zIndex = '1000';
            // 清除transform，避免干扰
            agreeBtn.style.transform = '';
            
            // 重新绑定按钮事件
            disagreeBtn.onclick = function() {
                // 点击不同意按钮，游戏失败
                cleanupMovementChallenge();
                handleDisagree();
            };
            
            agreeBtn.onclick = function() {
                // 增加点击次数
                level.clickCount++;
                
                // 显示气泡提示
                showBubble(agreeBtn, level.clickCount === 1 ? '你点到我了吗' : '真的点到了吗');
                
                // 检查是否达到通关条件
                if (level.clickCount >= 3) {
                    // 成功点击同意按钮三次，游戏胜利
                    showMovementVictory();
                    return;
                }
            };
            
            // 随机初始方向
            level.currentDirectionX = Math.random() > 0.5 ? 1 : -1;
            level.currentDirectionY = Math.random() > 0.5 ? 1 : -1;
            
            // 存储鼠标位置
            let mouseX = 0;
            let mouseY = 0;
            
            // 添加鼠标移动事件监听到整个文档，确保全屏范围都能检测
            document.addEventListener('mousemove', handleMouseMove);
            
            // 处理鼠标移动 - 仅更新鼠标位置
            function handleMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
            
            // 持续移动按钮的循环
            function updateMovement() {
                if (level.gameOver) return;
                
                const btnRect = agreeBtn.getBoundingClientRect();
                const btnX = btnRect.left + btnRect.width / 2;
                const btnY = btnRect.top + btnRect.height / 2;
                
                // 计算鼠标与按钮的距离
                const dx = mouseX - btnX;
                const dy = mouseY - btnY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                let currentSpeed = movementParams.speed;
                let moveX, moveY;
                
                // 如果鼠标靠近按钮，改变方向逃离
                if (distance < movementParams.distanceThreshold) {
                    // 使用逃离速度
                    currentSpeed = movementParams.escapeSpeed;
                    
                    // 计算远离鼠标的方向
                    const angle = Math.atan2(dy, dx);
                    moveX = -Math.cos(angle) * currentSpeed;
                    moveY = -Math.sin(angle) * currentSpeed;
                    
                    // 50%概率将同意按钮变为不同意按钮（带冷却）
                    const now = Date.now();
                    if (Math.random() < 0.5 && agreeBtn.textContent === '同意' && now - level.lastTransformTime > level.transformCooldown) {
                        level.lastTransformTime = now;
                        
                        // 保存当前位置
                        const currentLeft = agreeBtn.style.left;
                        const currentTop = agreeBtn.style.top;
                        
                        // 变为不同意按钮
                        agreeBtn.className = 'btn disagree-btn';
                        agreeBtn.textContent = '不同意';
                        agreeBtn.onclick = function() {
                            // 点击变为不同意的按钮，游戏失败
                            cleanupMovementChallenge();
                            handleDisagree();
                        };
                        
                        // 保持位置
                        agreeBtn.style.left = currentLeft;
                        agreeBtn.style.top = currentTop;
                        
                        // 2秒后变回同意按钮
                        setTimeout(() => {
                            if (!level.gameOver && agreeBtn.textContent === '不同意') {
                                agreeBtn.className = level.originalAgreeClass;
                                agreeBtn.textContent = level.originalAgreeText;
                                agreeBtn.onclick = function() {
                                    // 增加点击次数
                                    level.clickCount++;
                                    
                                    // 显示气泡提示
                                    showBubble(agreeBtn, level.clickCount === 1 ? '你点到我了吗' : '真的点到了吗');
                                    
                                    // 检查是否达到通关条件
                                    if (level.clickCount >= 3) {
                                        // 成功点击同意按钮三次，游戏胜利
                                        showMovementVictory();
                                        return;
                                    }
                                };
                            }
                        }, 2000);
                    }
                } else {
                    // 鼠标未靠近时，继续当前方向移动
                    moveX = level.currentDirectionX * currentSpeed;
                    moveY = level.currentDirectionY * currentSpeed;
                }
                
                // 获取当前按钮位置
                let currentLeft = parseFloat(agreeBtn.style.left) || level.originalAgreeLeft;
                let currentTop = parseFloat(agreeBtn.style.top) || level.originalAgreeTop;
                
                // 计算新位置
                let newLeft = currentLeft + moveX;
                let newTop = currentTop + moveY;
                
                // 限制按钮在整个网页可见区域内
                const btnWidth = agreeBtn.offsetWidth;
                const btnHeight = agreeBtn.offsetHeight;
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                // 碰到边界时反弹
                if (newLeft <= 0 || newLeft >= windowWidth - btnWidth) {
                    level.currentDirectionX *= -1;
                    newLeft = Math.max(0, Math.min(windowWidth - btnWidth, newLeft));
                }
                if (newTop <= 0 || newTop >= windowHeight - btnHeight) {
                    level.currentDirectionY *= -1;
                    newTop = Math.max(0, Math.min(windowHeight - btnHeight, newTop));
                }
                
                // 应用新位置
                agreeBtn.style.left = newLeft + 'px';
                agreeBtn.style.top = newTop + 'px';
                
                // 继续下一帧
                requestAnimationFrame(updateMovement);
            }
            
            // 启动移动循环
            requestAnimationFrame(updateMovement);
            
            // 显示气泡提示
            function showBubble(button, text) {
                // 移除之前的气泡
                const existingBubble = document.querySelector('.bubble');
                if (existingBubble) {
                    existingBubble.remove();
                }
                
                // 创建气泡元素
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.cssText = `
                    position: absolute;
                    background-color: rgba(0, 0, 0, 0.8);
                    color: white;
                    padding: 10px 15px;
                    border-radius: 20px;
                    font-size: 14px;
                    z-index: 1000;
                    pointer-events: none;
                    animation: bubbleFade 2s ease-out;
                `;
                bubble.textContent = text;
                
                // 添加动画
                const style = document.createElement('style');
                style.textContent = `
                    @keyframes bubbleFade {
                        0% { opacity: 0; transform: translateY(20px); }
                        20% { opacity: 1; transform: translateY(0); }
                        80% { opacity: 1; transform: translateY(0); }
                        100% { opacity: 0; transform: translateY(-20px); }
                    }
                `;
                document.head.appendChild(style);
                
                // 计算气泡位置
                const btnRect = button.getBoundingClientRect();
                const bubbleRect = bubble.getBoundingClientRect();
                
                bubble.style.left = (btnRect.left + btnRect.width / 2 - bubbleRect.width / 2) + 'px';
                bubble.style.top = (btnRect.top - bubbleRect.height - 10) + 'px';
                
                // 添加到页面
                document.body.appendChild(bubble);
                
                // 2秒后移除气泡
                setTimeout(() => {
                    if (bubble.parentNode) {
                        bubble.remove();
                    }
                    if (style.parentNode) {
                        style.remove();
                    }
                }, 2000);
            }
            
            // 显示胜利窗口

            // 清理移动关卡
            function cleanupMovementChallenge() {
                // 移除胜利提示窗口
                if (window.movementVictoryModal) {
                    try {

                // 移除隐藏的同意按钮
                if (level.hiddenAgreeBtn && level.hiddenAgreeBtn.parentNode) {

                    } catch (e) {

                // 恢复按钮原始状态
                if (level.originalAgreeBtn && level.originalDisagreeBtn) {
                    try {

                        level.originalAgreeBtn.style.cssText = level.originalAgreeStyle;
                        level.originalAgreeBtn.onclick = level.originalAgreeOnClick;

            // 关闭胜利窗口

            if (titleBar) {

                titleBar.addEventListener('mousedown', function(e) {
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    
                    // 获取当前的transform值
                    let currentTransform = termsWindow.style.transform || 'translate(0, 0)';
                    let match = currentTransform.match(/translate\(([\d-]+)px,\s*([\d-]+)px\)/);
                    startTransformX = match ? parseInt(match[1]) : 0;
                    startTransformY = match ? parseInt(match[2]) : 0;
                    
                    // 防止文本选择
                    e.preventDefault();
                });
                
                // 鼠标移动事件
                document.addEventListener('mousemove', function(e) {
                    if (!isDragging) return;
                    
                    // 计算移动距离

                    const deltaY = e.clientY - startY;
                    
                    // 计算新位置

                    const newY = startTransformY + deltaY;
                    
                    // 应用新位置

                // 鼠标释放事件
                document.addEventListener('mouseup', function() {
                    isDragging = false;

            // 开始不同意按钮移动
            function startDisagreeBtnMovement() {
                // 记录鼠标位置历史
                const mouseHistory = [];
                const historyLength = 60; // 约1秒的历史（60fps）
                
                // 鼠标移动事件
                document.addEventListener('mousemove', function(e) {
                    // 记录当前鼠标位置
                    mouseHistory.push({
                        x: e.clientX,
                        y: e.clientY,
                        timestamp: Date.now()
                    });
                    
                    // 保持历史记录长度
                    if (mouseHistory.length > historyLength) {
                        mouseHistory.shift();
                    }
                });
                
                // 移动不同意按钮
                function moveDisagreeBtn() {
                    if (level.gameOver) return;
                    
                    // 获取不同意按钮位置
                    const disagreeBtnRect = disagreeBtn.getBoundingClientRect();
                    const btnX = disagreeBtnRect.left + disagreeBtnRect.width / 2;
                    const btnY = disagreeBtnRect.top + disagreeBtnRect.height / 2;
                    
                    // 获取1秒前的鼠标位置，如果历史不够则用最早的位置
                    let targetMouseX = btnX;
                    let targetMouseY = btnY;
                    
                    if (mouseHistory.length > 0) {
                        // 找到1秒前的位置（或最早的位置）
                        const targetIndex = Math.max(0, mouseHistory.length - 60);
                        const targetPosition = mouseHistory[targetIndex];
                        targetMouseX = targetPosition.x;
                        targetMouseY = targetPosition.y;
                    }
                    
                    // 计算方向向量
                    const dx = targetMouseX - btnX;
                    const dy = targetMouseY - btnY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    // 有延迟的跟着1秒前的鼠标走，提高精准度
                    if (distance > 10) {
                        const moveX = (dx / distance) * 3; // 降低移动速度，提高精准度
                        const moveY = (dy / distance) * 3;
                        
                        // 计算新位置
                        const currentLeft = parseFloat(disagreeBtn.style.left) || disagreeBtnRect.left;
                        const currentTop = parseFloat(disagreeBtn.style.top) || disagreeBtnRect.top;
                        const newLeft = currentLeft + moveX;
                        const newTop = currentTop + moveY;
                        
                        // 限制在屏幕内
                        const windowWidth = window.innerWidth;
                        const windowHeight = window.innerHeight;
                        const newLeftClamped = Math.max(0, Math.min(windowWidth - disagreeBtnRect.width, newLeft));
                        const newTopClamped = Math.max(0, Math.min(windowHeight - disagreeBtnRect.height, newTop));
                        
                        // 应用新位置
                        disagreeBtn.style.position = 'fixed';
                        disagreeBtn.style.left = newLeftClamped + 'px';
                        disagreeBtn.style.top = newTopClamped + 'px';
                        disagreeBtn.style.zIndex = '1000';
                    }
                    
                    requestAnimationFrame(moveDisagreeBtn);
                }
                
                // 启动移动
                moveDisagreeBtn();
            }

                        20% { opacity: 1; transform: translateY(0); }

                document.head.appendChild(style);
                
                // 计算气泡位置
                const btnRect = button.getBoundingClientRect();

                bubble.style.left = (btnRect.left + btnRect.width / 2 - bubbleRect.width / 2) + 'px';

                // 添加到页面

                // 2秒后移除气泡

            // 使窗口可拖拽
            function makeWindowDraggable(windowElement, index) {
                const titleBar = windowElement.querySelector('.win7-titlebar');
                let isDragging = false;
                let startX, startY;
                let startTransformX = 0;
                let startTransformY = 0;
                const scale = 0.7; // 缩放比例
                
                if (titleBar) {
                    titleBar.style.cursor = 'move';
                    
                    // 鼠标按下事件
                    titleBar.addEventListener('mousedown', function(e) {
                        isDragging = true;
                        startX = e.clientX;
                        startY = e.clientY;
                        
                        // 获取当前的transform值
                        let currentTransform = windowElement.style.transform || 'translate(-50%, -50%) scale(0.7)';
                        let match = currentTransform.match(/translate\(([^,]+),\s*([^)]+)\)/);
                        if (match) {
                            let tx = match[1].replace('px', '').replace('%', '');
                            let ty = match[2].replace('px', '').replace('%', '');
                            
                            // 检查是否是百分比
                            if (match[1].includes('%')) {
                                // 如果是百分比，转换为像素
                                startTransformX = (parseFloat(tx) / 100) * window.innerWidth;
                                startTransformY = (parseFloat(ty) / 100) * window.innerHeight;
                            } else {
                                startTransformX = parseFloat(tx);
                                startTransformY = parseFloat(ty);
                            }
                        } else {
                            startTransformX = window.innerWidth / 2 - 350; // 700px宽度的一半
                            startTransformY = window.innerHeight / 2 - 300;
                        }
                        
                        // 防止文本选择
                        e.preventDefault();
                        
                        // 把当前窗口移到最上层
                        const maxZIndex = Math.max(...level.overlayWindows.map((win) => {
                            return parseInt(win.style.zIndex) || 1000;
                        }));
                        windowElement.style.zIndex = maxZIndex + 1;
                    });
                }
                
                // 鼠标移动事件
                document.addEventListener('mousemove', function(e) {
                    if (!isDragging) return;
                    
                    // 计算移动距离
                    const deltaX = e.clientX - startX;
                    const deltaY = e.clientY - startY;
                    
                    // 计算新位置
                    const newX = startTransformX + deltaX;
                    const newY = startTransformY + deltaY;
                    
                    // 应用新位置
                    windowElement.style.transform = `translate(${newX}px, ${newY}px) scale(${scale})`;
                });
                
                // 鼠标释放事件
                document.addEventListener('mouseup', function() {
                    isDragging = false;
                });
                
                // 鼠标离开窗口事件
                document.addEventListener('mouseleave', function() {
                    isDragging = false;
                });
            }

            // 清理打地鼠关卡
            if (window.successModal) {
                try {
                    window.successModal.remove();
                    window.successModal = null;
                } catch (e) {
                    console.log('Error removing whack-a-mole success modal:', e);
                }
            }
            
            // 清理叠加关卡的窗口
            const overlayWindows = document.querySelectorAll('[id^="overlay-window-"]');
            overlayWindows.forEach(window => {
                try {
                    window.remove();
                } catch (e) {
                    console.log('Error removing overlay window:', e);
                }
            });
            
            // 清理同意框容器
            const checkboxesContainer = document.querySelector('.checkboxes-container');
            if (checkboxesContainer) {
                try {
                    checkboxesContainer.remove();
                } catch (e) {
                    console.log('Error removing checkboxes container:', e);
                }
            }
            
            // 清理打地鼠游戏容器
            const whackAMoleGame = document.getElementById('whackAMoleGame');
            if (whackAMoleGame) {
                try {
                    whackAMoleGame.remove();
                } catch (e) {
                    console.log('Error removing whack-a-mole game:', e);
                }
            }
            
            // 清理经验游戏容器

            }
            
            // 清理气泡提示

                }
            });
            
            // 清理阅读挑战元素
            cleanupReadChallenge();
            
            // 重置所有坑人效果
            resetPrankEffects();
        }

        // 数组随机打乱函数（Fisher-Yates 洗牌算法）
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
